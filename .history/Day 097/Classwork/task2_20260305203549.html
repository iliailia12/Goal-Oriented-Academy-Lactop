<!-- დავალება 1: ფერის შეცვლა (Color Changer)
პირობა: შექმენი button და div (ზომით 100x100px). დაწერე სკრიპტი, რომელიც ღილაკზე ყოველი დაჭერისას div-ს ფონს შეუცვლის (მაგალითად, გადართავს წითელსა და ლურჯს შორის). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
</head>
<body>
    <div class="colorDiv">
        <button class="colorChangeBtn">click to Change Color</button>
    </div>


    <script>
        const btn = document.getElementsByClassName("colorChangeBtn")[0]
        const box = document.getElementsByClassName("colorDiv")[0]
        btn.addEventListener('click',()=>{
            box.style.backgroundColor = 'red'
        })
    </script>
</body>
</html>
